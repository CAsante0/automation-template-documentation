name: Deploy Pre-Built HTML to GitHub Pages

on:
  push:
    branches:
      - main # Change this to your default branch if different

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Create .nojekyll bypass file
        # This keeps your styling/themes working by bypassing Jekyll
        run: touch build/html/.nojekyll

      - name: Upload Pre-Built Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Pointing straight to your pre-compiled HTML folder
          path: build/html

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4